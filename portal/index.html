<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal — Dad Arcade</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕹️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#ccc;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center}
a{color:#0ff;text-decoration:none}
.container{max-width:900px;width:100%;padding:1.5rem}

/* Login */
.login-box{background:#1a1a2e;border:2px solid #333;border-radius:12px;padding:2.5rem;max-width:400px;margin:15vh auto 0}
.login-box h1{color:#ff6ec7;font-size:1.5rem;margin-bottom:1.5rem;text-align:center}
.login-box label{display:block;color:#888;font-size:0.85rem;margin-bottom:0.3rem}
.login-box input{width:100%;background:#111;border:2px solid #333;border-radius:6px;padding:0.7rem;color:#fff;font-family:inherit;font-size:1rem;margin-bottom:1rem}
.login-box input:focus{outline:none;border-color:#0ff}
.login-box button{width:100%;padding:0.8rem;background:#0ff;color:#111;border:none;border-radius:6px;font-family:inherit;font-size:1rem;font-weight:bold;cursor:pointer}
.login-box button:hover{background:#0dd}
.login-box button:disabled{opacity:0.5;cursor:not-allowed}
.login-error{color:#f44;font-size:0.85rem;margin-top:0.5rem;text-align:center;min-height:1.2em}

/* Dashboard */
.header{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;border-bottom:1px solid #333;margin-bottom:1.5rem}
.header h1{color:#ff6ec7;font-size:1.3rem}
.header button{background:none;border:1px solid #666;color:#888;padding:0.4rem 0.8rem;border-radius:4px;font-family:inherit;cursor:pointer;font-size:0.8rem}
.header button:hover{color:#fff;border-color:#fff}

.tabs{display:flex;gap:0;margin-bottom:1.5rem}
.tab{padding:0.6rem 1.5rem;background:#1a1a2e;border:1px solid #333;color:#888;cursor:pointer;font-family:inherit;font-size:0.9rem;transition:all 0.2s}
.tab:first-child{border-radius:6px 0 0 6px}
.tab:last-child{border-radius:0 6px 6px 0}
.tab.active{background:#333;color:#fff;border-color:#555}

.feed-list{display:flex;flex-direction:column;gap:0.8rem;max-height:60vh;overflow-y:auto;padding-right:0.5rem}
.feed-item{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:1rem}
.feed-item .meta{display:flex;justify-content:space-between;font-size:0.8rem;color:#666;margin-bottom:0.5rem}
.feed-item .name{color:#0ff}
.feed-item .msg{color:#ddd;font-size:0.9rem;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.feed-item.archived{opacity:0.4}

.empty{color:#555;text-align:center;padding:3rem;font-size:0.95rem}

.action-bar{display:flex;gap:1rem;align-items:center;margin-bottom:1rem}
.btn-prompt{background:#f0c420;color:#111;border:none;padding:0.6rem 1.2rem;border-radius:6px;font-family:inherit;font-size:0.9rem;font-weight:bold;cursor:pointer}
.btn-prompt:hover{background:#ddb020}
.btn-prompt:disabled{opacity:0.5;cursor:not-allowed}
.prompt-count{color:#888;font-size:0.85rem}

.prompt-output{margin:1rem 0}
.prompt-output textarea{width:100%;min-height:250px;background:#0a0a1a;border:1px solid #333;border-radius:6px;color:#0f0;font-family:'Courier New',monospace;font-size:0.8rem;padding:1rem;resize:vertical}
.btn-copy{background:#333;color:#fff;border:none;padding:0.4rem 1rem;border-radius:4px;font-family:inherit;cursor:pointer;font-size:0.8rem;margin-top:0.3rem}
.btn-copy:hover{background:#555}

.archive-toggle{color:#666;font-size:0.85rem;cursor:pointer;margin-top:1.5rem;display:block}
.archive-toggle:hover{color:#999}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const API = window.location.hostname === 'localhost' ? '' : 'https://dadarcade.com';
let token = sessionStorage.getItem('portal_token') || '';
let currentTab = 'bugs';
let ideas = [], bugs = [], archive = [];
let promptText = '';
let loading = false;

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  return res;
}

// Check session on load
(async () => {
  if (token) {
    try {
      const res = await api('/api/portal/feedback?type=bugs');
      if (res.ok) { await loadDashboard(); return; }
    } catch(e) {}
    token = '';
    sessionStorage.removeItem('portal_token');
  }
  renderLogin();
})();

function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-box">
      <h1>Dad Arcade Portal</h1>
      <form id="login-form">
        <label>Email</label>
        <input type="email" id="l-email" autocomplete="email" required>
        <label>Password</label>
        <input type="password" id="l-pass" autocomplete="current-password" required>
        <button type="submit" id="l-btn">Login</button>
        <div class="login-error" id="l-err"></div>
      </form>
    </div>
  `;
  document.getElementById('login-form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('l-btn');
    const err = document.getElementById('l-err');
    btn.disabled = true; btn.textContent = 'Logging in...'; err.textContent = '';
    try {
      const res = await fetch(API + '/api/portal/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('l-email').value,
          password: document.getElementById('l-pass').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      token = data.token;
      sessionStorage.setItem('portal_token', token);
      await loadDashboard();
    } catch(ex) {
      err.textContent = ex.message;
      btn.disabled = false; btn.textContent = 'Login';
    }
  };
}

function logout() {
  token = '';
  sessionStorage.removeItem('portal_token');
  renderLogin();
}

async function loadDashboard() {
  try {
    const [ideasRes, bugsRes, archRes] = await Promise.all([
      api('/api/portal/feedback?type=ideas'),
      api('/api/portal/feedback?type=bugs'),
      api('/api/portal/feedback?type=archive'),
    ]);
    ideas = (await ideasRes.json()).items || [];
    bugs = (await bugsRes.json()).items || [];
    archive = (await archRes.json()).items || [];
  } catch(e) {
    ideas = []; bugs = []; archive = [];
  }
  promptText = '';
  renderDashboard();
}

function renderDashboard() {
  const items = currentTab === 'ideas' ? ideas : bugs;
  const app = document.getElementById('app');

  let html = `
    <div class="header">
      <h1>Dad Arcade Portal</h1>
      <div>
        <span style="color:#666;font-size:0.8rem;margin-right:1rem">${ideas.length} ideas, ${bugs.length} bugs</span>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${currentTab==='bugs'?'active':''}" onclick="switchTab('bugs')">Glitch Reports (${bugs.length})</div>
      <div class="tab ${currentTab==='ideas'?'active':''}" onclick="switchTab('ideas')">Game Ideas (${ideas.length})</div>
    </div>
  `;

  if (currentTab === 'bugs') {
    html += `<div class="action-bar">
      <button class="btn-prompt" onclick="generatePrompt()" ${bugs.length===0?'disabled':''}>${loading?'Generating...':'Generate Claude Prompt'}</button>
      <span class="prompt-count">${bugs.length} unprocessed bug${bugs.length!==1?'s':''}</span>
    </div>`;
    if (promptText) {
      html += `<div class="prompt-output">
        <textarea id="prompt-text" readonly>${escHtml(promptText)}</textarea>
        <button class="btn-copy" onclick="copyPrompt()">Copy to clipboard</button>
      </div>`;
    }
  }

  if (items.length === 0) {
    html += `<div class="empty">No ${currentTab === 'ideas' ? 'game ideas' : 'glitch reports'} yet.</div>`;
  } else {
    html += '<div class="feed-list">';
    for (const item of items) {
      const d = new Date(item.timestamp);
      const date = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
      html += `<div class="feed-item">
        <div class="meta"><span class="name">${escHtml(item.name)}</span><span>${date}</span></div>
        <div class="msg">${escHtml(item.message)}</div>
      </div>`;
    }
    html += '</div>';
  }

  // Archive section for bugs tab
  if (currentTab === 'bugs' && archive.length > 0) {
    html += `<details style="margin-top:1.5rem"><summary class="archive-toggle">Archive (${archive.length} processed)</summary><div class="feed-list" style="margin-top:0.8rem;max-height:30vh">`;
    for (const item of archive) {
      const d = new Date(item.timestamp);
      const date = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      html += `<div class="feed-item archived">
        <div class="meta"><span class="name">${escHtml(item.name)}</span><span>${date}</span></div>
        <div class="msg">${escHtml(item.message)}</div>
      </div>`;
    }
    html += '</div></details>';
  }

  app.innerHTML = html;
}

function switchTab(tab) { currentTab = tab; promptText = ''; renderDashboard(); }

async function generatePrompt() {
  if (loading || bugs.length === 0) return;
  loading = true;
  renderDashboard();
  try {
    const res = await api('/api/portal/prompt', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    promptText = data.prompt;
    // Reload to show bugs moved to archive
    await loadDashboard();
    // Restore prompt text (loadDashboard clears it)
  } catch(e) {
    promptText = 'Error: ' + e.message;
  }
  loading = false;
  // Re-render with prompt visible (loadDashboard already rendered, but we need promptText)
  // loadDashboard clears promptText, so we need a workaround
}

// Override loadDashboard to preserve prompt after generation
const _origLoad = loadDashboard;
loadDashboard = async function() {
  const savedPrompt = promptText;
  await _origLoad();
  if (savedPrompt && !promptText) {
    promptText = savedPrompt;
    renderDashboard();
  }
};

function copyPrompt() {
  const ta = document.getElementById('prompt-text');
  if (ta) { navigator.clipboard.writeText(ta.value).then(() => {
    const btn = ta.nextElementSibling;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to clipboard', 1500);
  }); }
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
