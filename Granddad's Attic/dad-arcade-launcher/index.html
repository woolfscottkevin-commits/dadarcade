<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dad Arcade | Granddad's Attic</title>
  <style>
    :root { color-scheme: dark; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #18130f;
      color: #f7ead2;
      font-family: Georgia, "Times New Roman", serif;
    }
    main {
      width: min(720px, calc(100vw - 32px));
      display: grid;
      gap: 1rem;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 10vw, 5rem);
      font-weight: 500;
      letter-spacing: 0;
    }
    p {
      max-width: 36rem;
      margin: 0;
      color: #b89d7f;
      font-size: 1.15rem;
      line-height: 1.55;
    }
    a {
      width: fit-content;
      min-height: 44px;
      display: inline-grid;
      place-items: center;
      margin-top: 0.5rem;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(235, 203, 139, 0.46);
      border-radius: 6px;
      background: rgba(122, 79, 50, 0.45);
      color: #f7ead2;
      text-decoration: none;
    }
    a:hover,
    a:focus-visible {
      outline: none;
      border-color: #ebcb8b;
      background: rgba(179, 130, 69, 0.35);
    }
  </style>
</head>
<body>
  <main>
    <h1>Granddad's Attic</h1>
    <p>A quiet puzzle story about a room, a letter, and the secrets people wait too long to tell.</p>

  </main>

</html>
