<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>Granddad's Attic - Phase 2 Look Sheet</title>
    <link rel="stylesheet" href="./look-sheet.css?v=20260504-image-cache-fix">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Granddad's Attic - Phase 2 Look Sheet</h1>
          <p class="subhead">Click one candidate per row. Picks are saved in this browser.</p>
        </div>
        <div class="actions">
          <span id="progress" class="progress">0/27 picked</span>
          <button id="export" class="action" type="button">Export picks</button>
          <button id="clear" class="action" type="button">Clear</button>
        </div>
      </header>

      <section id="sheet" class="sheet" aria-label="Phase 2 asset choices"></section>
    </main>

    <aside id="export-panel" class="export-panel" aria-label="Exported picks">
      <div class="export-head">
        <h2>Selection Markdown</h2>
        <button id="close-export" class="action" type="button">Close</button>
      </div>
      <textarea id="export-text" spellcheck="false"></textarea>
    </aside>

    <script src="./assets.js?v=20260504-image-cache-fix"></script>
    <script src="./look-sheet.js?v=20260504-image-cache-fix"></script>
  </body>
</html>
