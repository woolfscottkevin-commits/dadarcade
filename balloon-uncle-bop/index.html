*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

#game{display:block;position:fixed;inset:0;touch-action:none;z-index:1}

/* ---------- HUD (never shakes) ---------- */

.hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:max(12px,env(safe-area-inset-top)) 16px 0}
.hud-pill{background:rgba(0,0,0,0.35);border:2px solid rgba(255,255,255,0.25);border-radius:999px;
  padding:8px 16px;font-size:clamp(1rem,3.4vw,1.5rem);font-weight:800;line-height:1;display:flex;align-items:center;gap:8px;backdrop-filter:blur(4px)}
.hud-lives{font-size:clamp(1.4rem,5vw,2rem);letter-spacing:2px;filter:drop-shadow(0 0 6px rgba(255,80,120,.6))}
.hud-progress{position:absolute;left:50%;top:max(14px,env(safe-area-inset-top));transform:translateX(-50%);
  width:min(46vw,360px);text-align:center}
.hud-progress .ptext{font-size:clamp(.85rem,3vw,1.25rem);font-weight:800;text-shadow:0 2px 6px rgba(0,0,0,.6);margin-bottom:6px}
.hud-bar{height:18px;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.4);border-radius:999px;overflow:hidden}
.hud-bar-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#ffe24a,#ff8a5b,#ff5d8f);transition:width .25s ease}

/* ---------- Overlays ---------- */
.overlay{position:fixed;inset:0;z-index:3;display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;gap:18px}
.overlay.show{display:flex;animation:pop .35s cubic-bezier(.2,1.4,.4,1)}

.game-title{font-size:clamp(2.4rem,11vw,5rem);font-weight:900;line-height:.95;letter-spacing:.01em;
  background:linear-gradient(90deg,#ffe24a,#ff5d8f,#7c5cff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 0 rgba(0,0,0,.25));text-transform:uppercase}
.tagline{font-size:clamp(1rem,4vw,1.4rem);font-weight:700;color:#ffd9e6;margin-top:-6px}

.big-btn{pointer-events:auto;cursor:pointer;border:none;border-radius:32px;
  padding:clamp(22px,4.5vw,34px) clamp(40px,9vw,72px);
  font-family:inherit;font-weight:900;font-size:clamp(1.8rem,7vw,3rem);color:#3a0d2a;text-transform:uppercase;letter-spacing:.02em;
  background:linear-gradient(180deg,#ffe24a,#ffb33e);box-shadow:0 10px 0 #c97d1e,0 18px 30px rgba(0,0,0,.45);
  display:flex;align-items:center;gap:18px;transition:transform .08s ease,box-shadow .08s ease}
.big-btn:active{transform:translateY(6px);box-shadow:0 4px 0 #c97d1e,0 8px 16px rgba(0,0,0,.45)}
.big-btn.pink{background:linear-gradient(180deg,#ff8fb6,#ff5d8f);color:#fff;box-shadow:0 10px 0 #b32f5b,0 18px 30px rgba(0,0,0,.45)}

/* board view sits over everything as a solid modal */
#screen-board{background:rgba(26,11,46,0.985);justify-content:flex-start;overflow-y:auto;
  padding:max(24px,env(safe-area-inset-top)) 18px max(40px,env(safe-area-inset-bottom));gap:16px}

/* trophy button on start */

  padding:9px 22px;display:flex;align-items:center;gap:8px;margin-top:2px}

/* combo popup */

</style>

<script>
"use strict";
//=================================================================
// Balloon Uncle Bop — touch-only tap game for little kids
//=================================================================

// ---------- Family faces (add/rename people by editing data only) ----------
// Every balloon that floats up is a RANDOM family member. Drop ONE photo per
// person into assets/ with the matching filename below and it appears
// automatically on the next load — no code changes. ANY photo works: it's
// auto-cropped to a circle (cover-fit), so it can be a normal phone photo with
// a background and any shape/size (a head-and-shoulders crop reads best). Until
// a photo is added, that person shows a distinct hand-drawn fallback (palette).
// To add a 4th person: copy a line, give it a new id/name/img + any palette.
const FACES = [
  { id:'dad',    name:'Dad',    img:'assets/face-dad.png',
    palette:{ body:'#ff5d8f', body2:'#c9356c', skin:'#ffd9a8', hair:'#7a4a2b' } },
  { id:'claire', name:'Claire', img:'assets/face-claire.png',
    palette:{ body:'#5db0ff', body2:'#2f6fc9', skin:'#ffd9a8', hair:'#caa24a' } },
  { id:'connor', name:'Connor', img:'assets/face-connor.png',
    palette:{ body:'#46d39a', body2:'#1f8f6a', skin:'#ffd9a8', hair:'#3a2a1a' } },
];
function randomFace(){ return FACES[Math.floor(Math.random()*FACES.length)]; }

// ---------- Level config ----------
// Each level is a FIXED WAVE: `count` Uncle balloons float up; pop them before
// they escape. Spawning stops once all `count` are out, so the level always
// ends with a clean screen. `lives` = how many balloons you can miss (or bombs
// you can tap) before the level is lost. Escalation: fewer/slower early → more
// balloons, faster rise, more on screen at once, and bombs on later levels.
const LEVELS = [
  { name:'Level 1', count:5,  maxConcurrent:2, riseFrac:0.060, spawnEvery:1.60, bombs:false, bombChance:0,    lives:3 },
  { name:'Level 2', count:7,  maxConcurrent:3, riseFrac:0.085, spawnEvery:1.30, bombs:false, bombChance:0,    lives:3 },
  { name:'Level 3', count:9,  maxConcurrent:4, riseFrac:0.105, spawnEvery:1.05, bombs:true,  bombChance:0.18, lives:4 },
  { name:'Level 4', count:11, maxConcurrent:5, riseFrac:0.130, spawnEvery:0.90, bombs:true,  bombChance:0.22, lives:4 },
  { name:'Level 5', count:14, maxConcurrent:6, riseFrac:0.150, spawnEvery:0.78, bombs:true,  bombChance:0.25, lives:5 },
];

// ---------- Storage ----------
const LS = {
  best:    'bub_best',
  pops:    'bub_lifetime_pops',
};
function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,String(v)); }catch(e){} }
let bestScore   = parseInt(lsGet(LS.best,'0'),10)||0;
let lifetimePops= parseInt(lsGet(LS.pops,'0'),10)||0;

// ---------- Canvas / viewport ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let cssW=0, cssH=0, dpr=1, sizeScale=1;

function resize(){
  const vw = (window.visualViewport && window.visualViewport.width)  || window.innerWidth;
  const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  cssW = Math.round(vw); cssH = Math.round(vh);
  dpr = Math.min(window.devicePixelRatio||1, 2.5); // cap for fill-rate
  canvas.width = Math.round(cssW*dpr);
  canvas.height= Math.round(cssH*dpr);
  canvas.style.width = cssW+'px';
  canvas.style.height= cssH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  sizeScale = Math.max(0.72, Math.min(1.25, Math.min(cssW,cssH)/620));
  // keep balloons on screen after a rotation
  for(const b of balloons){ b.x = Math.max(b.r, Math.min(cssW-b.r, b.x)); }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>{ resize(); setTimeout(resize,300); });
if(window.visualViewport) window.visualViewport.addEventListener('resize', resize);

// ---------- Asset loading with graceful fallback ----------
// Every image is optional. If a file is missing/broken we draw a clean
// canvas placeholder, so the game is 100% playable before any art exists.
const imgCache = {};
// iOS Safari silently refuses to decode/draw PNGs much above ~5 megapixels, so a
// perfectly valid but oversized phone photo still shows the drawn fallback with
// NO error. We warn loudly here (on load error AND on oversized decode) so a
// broken/HEIC/too-big photo is never invisible. Downsize photos to ~700px — see
// assets/README.txt.
const IMG_MAXPX = 5 * 1024 * 1024; // ~5 MP — the practical iOS decode ceiling
// `expected`=true for art that is SUPPOSED to be present (the family faces +
// Oliver). Those get a load-failure warning so a missing/HEIC photo is never
// invisible. Optional art (background, bomb, drawn-Oliver) is left silent on
// purpose — it has a clean fallback. The oversized-decode warning fires for ANY
// image, since a too-big file is always a real iOS-rendering problem.
function loadImg(src, expected){
  if(!src) return null;
  if(imgCache[src]) return imgCache[src];
  const im = new Image();
  im._ok = false;
  im.onload  = ()=>{
    im._ok = im.naturalWidth>0;
    if(im.naturalWidth*im.naturalHeight > IMG_MAXPX){
      console.warn('[balloon] '+src+' is '+im.naturalWidth+'×'+im.naturalHeight+
        ' ('+((im.naturalWidth*im.naturalHeight)/1048576).toFixed(1)+' MP) — too large; iPad/iOS may draw it blank. Downsize to ~700px.');
    }
  };
  im.onerror = ()=>{ im._ok = false;
    if(expected) console.warn('[balloon] failed to load '+src+' — confirm the file exists and is a real PNG/JPG (iPhone HEIC renamed .png will not load).'); };
  im.src = src;
  imgCache[src] = im;
  return im;
}
// background override (optional)
const bgImg = loadImg('assets/background.png');
// preload every family face (expected → warns if a photo is missing/HEIC/too big)
FACES.forEach(f=>loadImg(f.img, true));
// Oliver = the star (the nephew). His real photo is the cheering buddy at the
// bottom AND the big hero on the win screen. Kept separate from the family

const oliverFace = loadImg('assets/face-oliver.png', true);
const oliverImg = { idle:loadImg('assets/oliver-idle.png'), cheer:loadImg('assets/oliver-cheer.png'), sad:loadImg('assets/oliver-sad.png') };
const bombImg = loadImg('assets/bomb.png');

// ---------- Audio (Web Audio, runtime only, unlocked on first tap) ----------
let actx=null;
function initAudio(){
  if(actx) { if(actx.state==='suspended') actx.resume(); return; }
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    // tiny silent ping to fully unlock iOS
    const b=actx.createBuffer(1,1,22050), s=actx.createBufferSource();
    s.buffer=b; s.connect(actx.destination); s.start(0);
  }catch(e){ actx=null; }
}
function tone(freq, dur, type, gain, slideTo){
  if(!actx) return;
  const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq, t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(40,slideTo), t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(gain, t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g).connect(actx.destination);
  o.start(t); o.stop(t+dur+0.03);
}
function noiseBurst(dur, gain, cutoff){
  if(!actx) return;
  const t=actx.currentTime, len=Math.max(1,(actx.sampleRate*dur)|0);
  const buf=actx.createBuffer(1,len,actx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const s=actx.createBufferSource(); s.buffer=buf;
  const g=actx.createGain(); g.gain.value=gain;
  const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cutoff||1600;
  s.connect(f).connect(g).connect(actx.destination); s.start(t);
}
function sndBoing(){ const base=300+Math.random()*220; tone(base,0.13,'triangle',0.18,base*1.7); }
function sndPop(){ noiseBurst(0.16,0.32,2200); tone(680,0.12,'square',0.13,180); }
function sndAww(){ tone(420,0.45,'sine',0.20,180); tone(300,0.5,'sine',0.10,150); }
function sndLevel(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'triangle',0.18),i*110)); }
function sndGold(){ [784,988,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'triangle',0.16),i*55)); noiseBurst(0.12,0.18,4000); }
function sndWin(){ [523,659,784,1046,1318,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',0.2),i*120)); }
// rising "ladder" pop: pitch climbs with the current combo for a building feel
function sndPopCombo(n){ const base=560+Math.min(12,n)*55; noiseBurst(0.14,0.30,2400); tone(base,0.12,'square',0.13,180); }

//=================================================================
// Game state
//=================================================================
let state = 'start';              // start | playing | levelclear | lost | end
let levelIdx = 0;
let score = 0;
let levelStartScore = 0;          // score baseline, so a retry rolls back cleanly
let lives = 3;                    // hearts this level = miss budget
let uncleSpawned = 0;             // Uncle balloons released so far this level
let popped = 0;                   // Uncle balloons popped this level
let escaped = 0;                  // Uncle balloons that floated away this level
let runStartBest = bestScore;     // best at the moment this run began (for New Best!)
let spawnTimer = 0;
let firstBalloonHinted = false;   // show "TAP!" on the very first balloon
let hintActive = false;

const balloons = [];
const particles = [];            // pooled-ish; we cap length
const PARTICLE_CAP = 220;

// juice
let shakeT=0, shakeDur=0, shakeMag=0;
let hitstop=0;

// oliver
const oliver = { state:'idle', t:0, bob:0 };

let lastTS = 0;
let nextId = 1;

// combo: consecutive pops with no miss/bomb. Multiplier ramps gently (every 3
// pops → +1, capped at x5) so a good run scores more and feels like it's building.
let combo = 0;
let comboMult = 1;
function comboMultFor(c){ return Math.min(5, 1 + Math.floor(c/3)); }

// rare golden bonus balloon — a quick one-tap catch worth big points. Doesn't
// count toward the wave and costs nothing if it escapes. Pure treat / score chase.
const GOLD_CHANCE = 0.07;
const GOLD_BONUS = 50;

// ---------- Leaderboard ----------
const API_URL = '/api/scores?game=bub';   // relative → works locally + on dadarcade.com
const LB_LIMIT = 8;
let lbCache = { alltime:[], daily:[] };
let initialsChars = [14,11,8];   // O,L,I  (A=0); defaults to Oliver
let initialsCursor = 0;
let initialsSubmitting = false;
let pendingScore = 0;
let submittedThisRun = false;

//=================================================================
// Spawning / balloons
//=================================================================
function stageRadius(stage){
  const base=[54,66,80,96,116][stage-1];
  return base*sizeScale;
}
function hitRadius(b){ return Math.max(58, b.r + 16); } // always forgiving (≥110 dia)

function spawnBalloon(kind){
  const lvl = LEVELS[levelIdx];
  const isBomb = kind==='bomb';
  const isGold = kind==='gold';
  const stage = 1;
  const r = isBomb ? 64*sizeScale : (isGold ? 72*sizeScale : stageRadius(stage));
  const margin = r + 8;
  const x = margin + Math.random()*Math.max(1,(cssW - margin*2));
  const rise = lvl.riseFrac * cssH; // px per second upward
  const riseMul = isGold ? 1.35 : 1;            // gold drifts a touch faster — catch it!
  balloons.push({
    id: nextId++,
    kind: isBomb ? 'bomb' : (isGold ? 'gold' : 'uncle'),
    face: (isBomb||isGold) ? null : randomFace(),
    x, y: cssH + r + 10,
    stage,
    r,
    vy: -rise*riseMul*(0.85+Math.random()*0.3),
    vx: (Math.random()*2-1)*14*sizeScale,
    wob: Math.random()*Math.PI*2,
    tapAnim: 0,
    lastTap: -999,
    popping: false,
    popT: 0,
  });
}

function popBalloon(b){
  b.popping = true;
  b.popT = 0.26;            // brief frozen silly face
  // combo + multiplier
  combo++;
  const prevMult = comboMult;
  comboMult = comboMultFor(combo);
  const gain = 10*comboMult;
  score += gain;
  popped++;
  lifetimePops++; lsSet(LS.pops, lifetimePops);
  if(score>bestScore){ bestScore=score; lsSet(LS.best,bestScore); }
  // juice — escalates gently with the combo
  hitstop = Math.max(hitstop, 0.075);     // ~4-5 frame freeze
  addShake(0.18, (7+comboMult)*sizeScale);
  confettiBurst(b.x, b.y, 18+comboMult*6);
  const pal=(b.face||FACES[0]).palette;
  pushScorePop(b.x, b.y - b.r*0.6, '+'+gain, lighten(pal.body,40));
  oliverReact('cheer');
  sndPopCombo(combo);
  if(comboMult>prevMult && comboMult>=2) showCombo(comboMult);
  if(hintActive){ hintActive=false; }
  updateHUD();
  checkWin();              // popped them all? → level complete
}

// golden bonus balloon — one quick tap, big points, gold burst. Pure treat:
// it never counts toward the wave and never costs a life if it floats away.
function popGold(b){
  b.popping = true;
  b.popT = 0.26;
  combo++;                                  // keeps the streak alive
  comboMult = comboMultFor(combo);
  const gain = GOLD_BONUS*comboMult;
  score += gain;
  lifetimePops++; lsSet(LS.pops, lifetimePops);
  if(score>bestScore){ bestScore=score; lsSet(LS.best,bestScore); }
  hitstop = Math.max(hitstop, 0.09);
  addShake(0.24, 11*sizeScale);
  for(let i=0;i<34 && particles.length<PARTICLE_CAP;i++)
    pushParticle(b.x,b.y,'confetti',['#ffe24a','#fff3a8','#ffc23e','#fff'][(Math.random()*4)|0]);
  pushScorePop(b.x, b.y - b.r*0.6, '+'+gain+'!', '#ffe24a');
  oliverReact('cheer');
  sndGold();
  updateHUD();
}

function hitBomb(b){
  // gentle negative — never scary
  lives--;
  combo=0; comboMult=1;        // streak broken
  b.dead = true;
  addShake(0.22, 9*sizeScale);
  oliverReact('sad');
  sndAww();
  // soft grey puff
  for(let i=0;i<14;i++) pushParticle(b.x,b.y,'puff','#9aa');
  updateHUD();
  if(lives<=0) loseLevel();
}

//=================================================================
// Particles
//=================================================================
const CONFETTI_COLORS=['#ffe24a','#ff5d8f','#7c5cff','#3ec6b8','#ff8a5b','#7cff8a','#fff'];
function pushParticle(x,y,type,color){
  if(particles.length>=PARTICLE_CAP) particles.shift();
  const a=Math.random()*Math.PI*2;
  const spd=(type==='confetti'?120:70)*(0.4+Math.random())*sizeScale;
  particles.push({
    x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd - (type==='confetti'?60:30),
    life:(type==='confetti'?0.9:0.5), max:(type==='confetti'?0.9:0.5),
    size:(type==='confetti'?(6+Math.random()*7):(4+Math.random()*5))*sizeScale,
    color, type, rot:Math.random()*6.28, vr:(Math.random()*2-1)*10,
  });
}
function confettiBurst(x,y,n){ for(let i=0;i<n;i++) pushParticle(x,y,'confetti',CONFETTI_COLORS[(Math.random()*CONFETTI_COLORS.length)|0]); }
function tapPuff(x,y,col){ for(let i=0;i<7;i++) pushParticle(x,y,'puff',col); }
// floating "+N" score popup — drifts up and fades at the pop point
function pushScorePop(x,y,text,color){
  if(particles.length>=PARTICLE_CAP) particles.shift();
  particles.push({ x,y, vx:0, vy:-70*sizeScale, life:0.95, max:0.95,
    size:(22+Math.random()*4)*sizeScale, color, type:'text', text:text, rot:0, vr:0 });
}
function bigCascade(){
  for(let i=0;i<70 && particles.length<PARTICLE_CAP;i++){
    pushParticle(Math.random()*cssW, -10 - Math.random()*cssH*0.3, 'confetti', CONFETTI_COLORS[(Math.random()*CONFETTI_COLORS.length)|0]);
  }
}

//=================================================================
// Screen shake
//=================================================================
function addShake(dur,mag){ shakeT=dur; shakeDur=dur; shakeMag=Math.max(shakeMag,mag); }

//=================================================================
// Oliver
//=================================================================
function oliverReact(s){ oliver.state=s; oliver.t = (s==='cheer'?0.5:0.8); }

//=================================================================
// Level / round flow
//=================================================================
function startGame(){
  initAudio();
  levelIdx=0; score=0; levelStartScore=0;
  runStartBest = bestScore;
  firstBalloonHinted=false;
  particles.length=0;
  show('screen-start',false); show('screen-end',false); show('screen-lost',false);
  beginLevel(true);
  gtag('event','level_start',{game:'balloon-uncle-bop',level:1});
}

// (Re)start the current level. fresh=true on first entry / advance (records the
// score baseline); fresh=false on retry (rolls score back to that baseline so
// replaying a level can't inflate the score).
function beginLevel(fresh){
  if(fresh) levelStartScore=score; else score=levelStartScore;
  const lvl=LEVELS[levelIdx];
  lives=lvl.lives;
  uncleSpawned=0; popped=0; escaped=0;
  combo=0; comboMult=1;
  balloons.length=0;
  spawnTimer=0.4; hitstop=0; shakeT=0;
  hintActive=false;
  oliver.state='idle'; oliver.t=0;
  show('screen-lost',false); show('screen-end',false);
  hideBanner();
  state='playing';
  updateHUD();
}

// Win check: the whole wave is resolved (every Uncle popped or escaped) and we
// still have hearts left.
function checkWin(){
  if(state!=='playing') return;
  if(popped+escaped >= LEVELS[levelIdx].count) winLevel();
}

function winLevel(){
  if(levelIdx >= LEVELS.length-1){ endGame(true); return; }
  state='levelclear';
  balloons.length=0; hintActive=false;
  sndLevel(); bigCascade(); oliverReact('cheer');
  showBanner('Level '+(levelIdx+1)+' Done!');
  gtag('event','level_complete',{game:'balloon-uncle-bop',level:levelIdx+1});
  setTimeout(()=>{
    levelIdx++;
    beginLevel(true);
    gtag('event','level_start',{game:'balloon-uncle-bop',level:levelIdx+1});
  }, 1700);
}

function loseLevel(){
  state='lost';
  balloons.length=0; hintActive=false;
  oliverReact('sad'); sndAww();
  document.getElementById('lost-level').textContent = LEVELS[levelIdx].name;
  show('screen-lost',true);
  gtag('event','level_failed',{game:'balloon-uncle-bop',level:levelIdx+1});
}

function endGame(won){    // full-game win (or generic end)
  state='end';
  balloons.length=0;            // clean end screen (overlay is transparent)
  hintActive=false;
  if(won){ sndWin(); bigCascade(); setTimeout(bigCascade,500); oliverReact('cheer'); }
  const isBest = score>runStartBest && score>0;
  if(score>bestScore){ bestScore=score; lsSet(LS.best,bestScore); }
  // OLIVER WINS! — his face is the peak reveal, win only (never on a sad ending)
  document.getElementById('end-crown').style.display = won ? 'block' : 'none';
  document.getElementById('end-oliver').style.display = (won && oliverFace && oliverFace._ok) ? 'block' : 'none';
  document.getElementById('end-title').textContent = won ? 'Oliver Wins!' : 'Good Game!';
  document.getElementById('end-score').textContent = score;
  document.getElementById('end-best').textContent = 'Best: '+bestScore;
  document.getElementById('end-newbest').style.display = isBest ? 'block' : 'none';
  startLeaderboardEntry(score);   // initials entry + board on the end screen
  show('screen-end',true);
  gtag('event', won?'game_win':'game_over', {game:'balloon-uncle-bop', score:score, level:levelIdx+1});
}

//=================================================================
// Input (pointer = unified mouse/touch/pen; one finger = one tap)
//=================================================================
function canvasPoint(e){
  const r=canvas.getBoundingClientRect();
  return { x:e.clientX-r.left, y:e.clientY-r.top };
}
function onPointerDown(e){
  e.preventDefault();
  if(state!=='playing') return;
  initAudio();
  const p=canvasPoint(e);
  const now=lastTS;
  // topmost balloon first (later in array = drawn on top)
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    if(b.popping||b.dead) continue;
    const dx=p.x-b.x, dy=p.y-b.y, hr=hitRadius(b);
    if(dx*dx+dy*dy <= hr*hr){
      // debounce: never let two near-simultaneous touches double-count one balloon
      if(now - b.lastTap < 0.09) return;
      b.lastTap = now;
      tapBalloon(b);
      return; // one tap affects exactly one balloon
    }
  }
}
function tapBalloon(b){
  if(b.kind==='bomb'){ hitBomb(b); return; }
  if(b.kind==='gold'){ b.tapAnim=1; tapPuff(b.x,b.y-b.r*0.3,'#ffe24a'); popGold(b); return; }
  b.tapAnim = 1;
  const pal=(b.face||FACES[0]).palette;
  tapPuff(b.x, b.y - b.r*0.3, pal.body);
  if(b.stage>=5){
    popBalloon(b);
  }else{
    b.stage++;
    b.r = stageRadius(b.stage);
    sndBoing();
  }
}
canvas.addEventListener('pointerdown', onPointerDown, {passive:false});
// belt-and-suspenders: block iOS gesture zoom
['gesturestart','gesturechange','dblclick'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));

//=================================================================
// Update
//=================================================================
function update(dt){
  // juice timers run even during hitstop
  if(shakeT>0) shakeT=Math.max(0,shakeT-dt);
  oliver.t=Math.max(0,oliver.t-dt); if(oliver.t<=0) oliver.state='idle';
  oliver.bob += dt;
  // particles always animate
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.life-=dt; if(pt.life<=0){ particles.splice(i,1); continue; }
    if(pt.type==='text'){ pt.y+=pt.vy*dt; pt.vy*=0.90; }   // drift up + slow, no gravity
    else {
      pt.vy += 240*dt*sizeScale;        // gravity
      pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.rot+=pt.vr*dt;
      pt.vx*=0.99;
    }
  }
  if(hitstop>0){ hitstop-=dt; return; } // freeze the world (balloons) only

  if(state!=='playing') return;

  const lvl=LEVELS[levelIdx];
  // Spawn the wave: release `count` Uncle balloons over time, with bombs mixed
  // in on later levels. Once all Uncles are out, spawning stops entirely.
  spawnTimer-=dt;
  const onScreen=balloons.filter(b=>!b.popping&&!b.dead).length;
  if(uncleSpawned<lvl.count && spawnTimer<=0 && onScreen<lvl.maxConcurrent){
    const roll=Math.random();
    if(roll<GOLD_CHANCE){
      spawnBalloon('gold');                 // rare bonus — doesn't count toward the wave
    }else if(lvl.bombs && roll<GOLD_CHANCE+lvl.bombChance){
      spawnBalloon('bomb');                 // decoy — doesn't count toward the wave
    }else{
      spawnBalloon('uncle'); uncleSpawned++;
    }
    spawnTimer=lvl.spawnEvery*(0.75+Math.random()*0.5);
    if(!firstBalloonHinted){ firstBalloonHinted=true; hintActive=true; }
  }
  // move balloons
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    if(!b) continue;                  // array may be cleared mid-frame on win/lose
    if(b.dead){ balloons.splice(i,1); continue; }
    if(b.tapAnim>0) b.tapAnim=Math.max(0,b.tapAnim-dt*5);
    if(b.popping){
      b.popT-=dt;
      b.y += b.vy*dt*0.3;
      if(b.popT<=0){ balloons.splice(i,1); }
      continue;
    }
    b.wob+=dt*2;
    b.y += b.vy*dt;
    b.x += Math.sin(b.wob)*8*sizeScale*dt + b.vx*dt;
    if(b.x<b.r){ b.x=b.r; b.vx=Math.abs(b.vx); }
    if(b.x>cssW-b.r){ b.x=cssW-b.r; b.vx=-Math.abs(b.vx); }
    // floated off the top
    if(b.y + b.r < -10){
      balloons.splice(i,1);
      if(b.kind==='uncle'){
        // missed one — costs a heart (gentle), and counts toward the wave
        escaped++; lives--;
        combo=0; comboMult=1;        // streak broken
        oliverReact('sad'); sndAww(); addShake(0.12, 4*sizeScale);
        updateHUD();
        if(lives<=0) loseLevel();
        else checkWin();
      }
      // bombs and gold that float away are harmless (good!) — just removed
    }
  }
}

//=================================================================
// Drawing
//=================================================================
function drawBackground(){
  if(bgImg && bgImg._ok){
    // cover-fit
    const ir=bgImg.naturalWidth/bgImg.naturalHeight, cr=cssW/cssH;
    let w=cssW,h=cssH,ox=0,oy=0;
    if(ir>cr){ h=cssH; w=h*ir; ox=(cssW-w)/2; } else { w=cssW; h=w/ir; oy=(cssH-h)/2; }
    ctx.drawImage(bgImg,ox,oy,w,h);
    return;
  }
  // party gradient sky
  const g=ctx.createLinearGradient(0,0,0,cssH);
  g.addColorStop(0,'#3a1361'); g.addColorStop(0.55,'#7a2a8f'); g.addColorStop(1,'#ff7ab3');
  ctx.fillStyle=g; ctx.fillRect(0,0,cssW,cssH);
  // soft confetti dots in bg
  ctx.globalAlpha=0.10; ctx.fillStyle='#fff';
  for(let i=0;i<26;i++){ const x=((i*137.5)%cssW), y=((i*263.1)%cssH); ctx.fillRect(x,y,4,4); }
  ctx.globalAlpha=1;
}

function roundFace(x,y,r,palette,stage,silly){
  // body (balloon) — rounded, slightly egg-shaped
  const grd=ctx.createRadialGradient(x-r*0.3,y-r*0.4,r*0.2,x,y,r);
  grd.addColorStop(0, lighten(palette.body,30));
  grd.addColorStop(1, palette.body2||palette.body);
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.ellipse(x,y,r*0.92,r,0,0,Math.PI*2); ctx.fill();
  // shine
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.ellipse(x-r*0.32,y-r*0.4,r*0.18,r*0.26,-0.5,0,Math.PI*2); ctx.fill();
  // knot + string
  ctx.fillStyle=palette.body2||palette.body;
  ctx.beginPath(); ctx.moveTo(x-r*0.12,y+r*0.96); ctx.lineTo(x+r*0.12,y+r*0.96); ctx.lineTo(x,y+r*1.12); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x,y+r*1.12); ctx.quadraticCurveTo(x+r*0.18,y+r*1.4,x-r*0.05,y+r*1.6); ctx.stroke();
  // pirate hat (skin flavor)
  if(palette.hat){
    ctx.fillStyle=palette.hat;
    ctx.beginPath(); ctx.ellipse(x,y-r*0.62,r*0.78,r*0.34,0,Math.PI,0); ctx.fill();
    ctx.fillRect(x-r*0.78,y-r*0.66,r*1.56,r*0.12);
    ctx.fillStyle=palette.accent||'#ffe24a';
    ctx.beginPath(); ctx.arc(x,y-r*0.72,r*0.12,0,Math.PI*2); ctx.fill();
  }
  // eyes — get sillier (wider apart / wonkier) with stage
  const ew=r*(0.22+stage*0.02), ex=r*0.34, ey=-r*0.14;
  for(const s of [-1,1]){
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(x+s*ex,y+ey,ew*0.7,ew*0.8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222';
    const px = silly ? s*ex*0.4 : 0; // googly when silly
    ctx.beginPath(); ctx.arc(x+s*ex+px, y+ey+(silly?ew*0.2:0), ew*0.34,0,Math.PI*2); ctx.fill();
  }
  // rosy cheeks
  ctx.fillStyle='rgba(255,120,150,0.5)';
  for(const s of [-1,1]){ ctx.beginPath(); ctx.arc(x+s*r*0.5,y+r*0.18,r*0.13,0,Math.PI*2); ctx.fill(); }
  // mouth — bigger, sillier grin per stage
  ctx.strokeStyle='#3a1020'; ctx.lineWidth=Math.max(3,r*0.06); ctx.lineCap='round';
  const mw=r*(0.30+stage*0.06), my=y+r*0.32, md=r*(0.12+stage*0.05);
  ctx.beginPath(); ctx.moveTo(x-mw,my); ctx.quadraticCurveTo(x,my+md+ (silly?r*0.25:0), x+mw,my); ctx.stroke();
  if(stage>=4){ // tongue/teeth when really puffed
    ctx.fillStyle='#ff7a9a';
    ctx.beginPath(); ctx.ellipse(x,my+md*0.7,mw*0.45,md*0.7,0,0,Math.PI); ctx.fill();
  }
}

function drawBombFallback(x,y,r){
  const grd=ctx.createRadialGradient(x-r*0.3,y-r*0.4,r*0.2,x,y,r);
  grd.addColorStop(0,'#7d3b3b'); grd.addColorStop(1,'#3a0d12');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.ellipse(x,y,r*0.92,r,0,0,Math.PI*2); ctx.fill();
  // stormy red rim
  ctx.strokeStyle='#ff3b5c'; ctx.lineWidth=Math.max(3,r*0.08);
  ctx.beginPath(); ctx.ellipse(x,y,r*0.92,r,0,0,Math.PI*2); ctx.stroke();
  // angry brows
  ctx.strokeStyle='#ffd24a'; ctx.lineWidth=Math.max(4,r*0.1); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x-r*0.5,y-r*0.42); ctx.lineTo(x-r*0.12,y-r*0.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+r*0.5,y-r*0.42); ctx.lineTo(x+r*0.12,y-r*0.2); ctx.stroke();
  // eyes
  ctx.fillStyle='#fff';
  for(const s of[-1,1]){ ctx.beginPath(); ctx.arc(x+s*r*0.3,y-r*0.04,r*0.13,0,6.28); ctx.fill(); }
  ctx.fillStyle='#222';
  for(const s of[-1,1]){ ctx.beginPath(); ctx.arc(x+s*r*0.3,y-r*0.04,r*0.06,0,6.28); ctx.fill(); }
  // grumpy frown
  ctx.strokeStyle='#ffd24a'; ctx.lineWidth=Math.max(3,r*0.07);
  ctx.beginPath(); ctx.moveTo(x-r*0.32,y+r*0.45); ctx.quadraticCurveTo(x,y+r*0.2,x+r*0.32,y+r*0.45); ctx.stroke();
  // knot
  ctx.fillStyle='#3a0d12';
  ctx.beginPath(); ctx.moveTo(x-r*0.12,y+r*0.96); ctx.lineTo(x+r*0.12,y+r*0.96); ctx.lineTo(x,y+r*1.12); ctx.closePath(); ctx.fill();
}

function drawBalloon(b){
  let sx=1, sy=1;
  if(b.tapAnim>0){ const t=b.tapAnim; sx=1+0.22*t; sy=1-0.18*t; }
  if(b.popping){ const k=1-(b.popT/0.26); sx=sy=1+0.35*k; } // expand as it pops
  ctx.save();
  ctx.translate(b.x,b.y); ctx.scale(sx,sy); ctx.translate(-b.x,-b.y);
  if(b.kind==='bomb'){
    if(bombImg && bombImg._ok) drawImgCentered(bombImg,b.x,b.y,b.r,'#3a0d12');
    else drawBombFallback(b.x,b.y,b.r);
  }else if(b.kind==='gold'){
    drawGoldBalloon(b.x,b.y,b.r);
  }else{
    const face = b.face || FACES[0];
    const img = loadImg(face.img);
    if(img && img._ok){
      drawImgCentered(img,b.x,b.y,b.r,(face.palette.body2||face.palette.body));
    }else{
      roundFace(b.x,b.y,b.r,face.palette,b.stage,b.popping||b.stage>=5);
    }
  }
  ctx.restore();
}
// Draw a photo AS a glossy balloon: knot + string behind, the photo cover-fit
// and clipped to the balloon ellipse (so any-shape photos look right), then a
// rim + shine on top so it reads as a real balloon.
function drawImgCentered(img,x,y,r,knot){
  const cy=y - r*0.08;                       // balloon center (matches roundFace)
  ctx.fillStyle=knot||'#c9356c';
  ctx.beginPath(); ctx.moveTo(x-r*0.12,cy+r*0.96); ctx.lineTo(x+r*0.12,cy+r*0.96); ctx.lineTo(x,cy+r*1.12); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x,cy+r*1.12); ctx.quadraticCurveTo(x+r*0.18,cy+r*1.4,x-r*0.05,cy+r*1.6); ctx.stroke();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(x,cy,r*0.92,r,0,0,Math.PI*2); ctx.clip();
  const bw=r*1.84, bh=r*2;                    // cover-fit the photo into the ellipse box
  const ar=(img.naturalWidth||1)/(img.naturalHeight||1);
  let w=bw, h=bw/ar; if(h<bh){ h=bh; w=bh*ar; }
  ctx.drawImage(img, x-w/2, cy-h/2, w, h);
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=Math.max(2,r*0.05);
  ctx.beginPath(); ctx.ellipse(x,cy,r*0.92,r,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.32)';
  ctx.beginPath(); ctx.ellipse(x-r*0.34,cy-r*0.42,r*0.16,r*0.24,-0.5,0,Math.PI*2); ctx.fill();
}

function drawStar(cx,cy,outer,inner,fill){
  ctx.fillStyle=fill; ctx.beginPath();
  for(let i=0;i<10;i++){
    const ang=-Math.PI/2 + i*Math.PI/5, rad=(i%2===0)?outer:inner;
    const px=cx+Math.cos(ang)*rad, py=cy+Math.sin(ang)*rad;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.fill();
}
function drawGoldBalloon(x,y,r){
  const cy=y - r*0.08;
  ctx.fillStyle='#b8860b';
  ctx.beginPath(); ctx.moveTo(x-r*0.12,cy+r*0.96); ctx.lineTo(x+r*0.12,cy+r*0.96); ctx.lineTo(x,cy+r*1.12); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x,cy+r*1.12); ctx.quadraticCurveTo(x+r*0.18,cy+r*1.4,x-r*0.05,cy+r*1.6); ctx.stroke();
  const grd=ctx.createRadialGradient(x-r*0.3,cy-r*0.4,r*0.2,x,cy,r);
  grd.addColorStop(0,'#fff6c2'); grd.addColorStop(0.5,'#ffd84a'); grd.addColorStop(1,'#e89a1c');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.ellipse(x,cy,r*0.92,r,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(x-r*0.32,cy-r*0.4,r*0.18,r*0.26,-0.5,0,Math.PI*2); ctx.fill();
  drawStar(x,cy,r*0.5,r*0.22,'#fff');
  const tw=(Math.sin(lastTS*0.008)*0.5+0.5);
  ctx.globalAlpha=0.4+0.6*tw; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(x+r*0.52,cy-r*0.46,r*0.09,0,6.28); ctx.fill();
  ctx.globalAlpha=1;
}

function drawOliver(){
  const base=120*sizeScale;
  const st=oliver.state;
  const baseY=cssH - base*0.5 - 4;
  const x=cssW*0.5;
  // motion conveys mood: idle gentle bob, cheer = happy jumps, sad = small droop.
  let y=baseY, scale=1, tilt=0;
  if(st==='cheer'){ y=baseY-Math.abs(Math.sin(oliver.bob*12))*16*sizeScale; scale=1.12; tilt=Math.sin(oliver.bob*16)*0.10; }
  else if(st==='sad'){ y=baseY+5*sizeScale; scale=0.92; tilt=0.12; }
  else { y=baseY+Math.sin(oliver.bob*4)*4*sizeScale; }

  // Oliver's REAL photo as the cheering buddy (circular). His photo never changes
  // expression, so his face is never shown "sad" — only the motion droops.
  if(oliverFace && oliverFace._ok){
    const r=base*0.5*scale;
    ctx.save(); ctx.translate(x,y); ctx.rotate(tilt);
    ctx.fillStyle = st==='cheer' ? '#ffe24a' : '#7c5cff';     // ring frame, gold when cheering
    ctx.beginPath(); ctx.arc(0,0,r+4*sizeScale,0,6.28); ctx.fill();
    ctx.save(); ctx.beginPath(); ctx.arc(0,0,r,0,6.28); ctx.clip();
    const ar=(oliverFace.naturalWidth||1)/(oliverFace.naturalHeight||1);
    let w=r*2,h=r*2/ar; if(h<r*2){ h=r*2; w=r*2*ar; }
    ctx.drawImage(oliverFace,-w/2,-h/2,w,h);
    ctx.restore(); ctx.restore();
    return;
  }
  // ---- fallback drawn buddy (only if his photo isn't present) ----
  const im = oliverImg[st];
  if(im && im._ok){ ctx.drawImage(im, x-base/2, y-base/2, base, base); return; }
  ctx.save(); ctx.translate(x,y); ctx.rotate(tilt);
  const r=base*0.42;
  const g=ctx.createLinearGradient(0,-r,0,r);
  g.addColorStop(0,'#7c5cff'); g.addColorStop(1,'#4a2db5');
  ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(0,0,r,r*1.05,0,0,6.28); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.ellipse(0,r*0.25,r*0.6,r*0.66,0,0,6.28); ctx.fill();
  ctx.fillStyle='#fff'; for(const s of[-1,1]){ ctx.beginPath(); ctx.arc(s*r*0.32,-r*0.3,r*0.2,0,6.28); ctx.fill(); }
  ctx.fillStyle='#222';
  const look = st==='sad'?0.12:0;
  for(const s of[-1,1]){ ctx.beginPath(); ctx.arc(s*r*0.32,-r*0.3+r*look,r*0.1,0,6.28); ctx.fill(); }
  ctx.strokeStyle='#222'; ctx.lineWidth=r*0.1; ctx.lineCap='round'; ctx.beginPath();
  if(st==='sad'){ ctx.arc(0,r*0.28,r*0.26,Math.PI*1.15,Math.PI*1.85); }
  else { ctx.arc(0,r*0.05,r*0.3, st==='cheer'?0.15:0.25, Math.PI-0.15); }
  ctx.stroke();
  ctx.strokeStyle='#4a2db5'; ctx.lineWidth=r*0.18; ctx.lineCap='round';
  if(st==='cheer'){ ctx.beginPath(); ctx.moveTo(-r*0.8,0); ctx.lineTo(-r*1.1,-r*0.6); ctx.moveTo(r*0.8,0); ctx.lineTo(r*1.1,-r*0.6); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(-r*0.8,r*0.1); ctx.lineTo(-r*1.05,r*0.4); ctx.moveTo(r*0.8,r*0.1); ctx.lineTo(r*1.05,r*0.4); ctx.stroke(); }
  ctx.restore();
}

function drawParticles(){
  for(const pt of particles){
    const a=Math.max(0,pt.life/pt.max);
    ctx.globalAlpha=a;
    ctx.save(); ctx.translate(pt.x,pt.y); ctx.rotate(pt.rot);
    if(pt.type==='text'){
      ctx.font='900 '+pt.size+'px ui-rounded,system-ui,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.lineWidth=Math.max(3,pt.size*0.18); ctx.strokeStyle='rgba(58,16,32,0.9)';
      ctx.strokeText(pt.text,0,0);
      ctx.fillStyle=pt.color; ctx.fillText(pt.text,0,0);
    } else {
      ctx.fillStyle=pt.color;
      if(pt.type==='confetti') ctx.fillRect(-pt.size/2,-pt.size/2,pt.size,pt.size*0.6);
      else { ctx.beginPath(); ctx.arc(0,0,pt.size/2,0,6.28); ctx.fill(); }
    }
    ctx.restore();
  }
  ctx.globalAlpha=1; ctx.textAlign='start'; ctx.textBaseline='alphabetic';
}

function drawHint(){
  if(!hintActive) return;
  const b=balloons.find(x=>x.kind==='uncle'&&!x.popping);
  if(!b) return;
  const t=(Math.sin(lastTS*5)*0.5+0.5);
  ctx.globalAlpha=0.5+0.5*t;
  ctx.fillStyle='#fff'; ctx.strokeStyle='#3a1020'; ctx.lineWidth=3;
  ctx.font='800 '+(28*sizeScale)+'px ui-rounded,system-ui,sans-serif';
  ctx.textAlign='center';
  const ty=b.y - b.r - 18*sizeScale - t*8;
  ctx.strokeText('TAP!',b.x,ty); ctx.fillText('TAP!',b.x,ty);
  // finger
  ctx.font=(34*sizeScale)+'px serif';
  ctx.fillText('👆', b.x, b.y + b.r*0.2);
  ctx.globalAlpha=1; ctx.textAlign='start';
}

function render(){
  // HUD only belongs during play — keep it off the start/win/lose/board screens
  document.getElementById('hud').style.opacity = (state==='playing'||state==='levelclear') ? '1' : '0';
  drawBackground();
  // world layer (shakes)
  ctx.save();
  if(shakeT>0){
    const k=shakeT/shakeDur, m=shakeMag*k;
    ctx.translate((Math.random()*2-1)*m,(Math.random()*2-1)*m);
  } else { shakeMag=0; }
  // Oliver buddy cheers during play/start, but never on the lose screen (his
  // face stays off failure) or the win screen (the big hero is the only Oliver).
  if(state!=='lost' && state!=='end') drawOliver();
  for(const b of balloons) drawBalloon(b);
  drawParticles();
  drawHint();
  ctx.restore();
}

//=================================================================
// Main loop
//=================================================================
function frame(ts){
  if(!lastTS) lastTS=ts;
  let dt=(ts-lastTS)/1000;
  lastTS=ts;
  if(dt>0.05) dt=0.05; // clamp big gaps (tab switch / lag)
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ---------- family showcase ----------
// Non-interactive: shows who you'll be popping. Each balloon picks a random
// face at spawn, so there's nothing to select here.
function buildSkins(){
  const wrap=document.getElementById('skins'); wrap.innerHTML='';
  FACES.forEach(f=>{
    const el=document.createElement('div');
    el.className='skin sel'; el.style.cursor='default';
    const cv=document.createElement('canvas'); cv.width=120; cv.height=120;
    el.appendChild(cv);
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=f.name; el.appendChild(nm);
    // draw preview using the real photo if present, else the fallback face
    const c2=cv.getContext('2d');
    const img=loadImg(f.img);
    const drawPrev=()=>{
      c2.clearRect(0,0,120,120);
      if(img && img._ok){
        c2.save(); c2.beginPath(); c2.arc(60,60,56,0,6.28); c2.clip();
        const ar=(img.naturalWidth||1)/(img.naturalHeight||1);
        let w=112,h=112/ar; if(h<112){ h=112; w=112*ar; }
        c2.drawImage(img,60-w/2,60-h/2,w,h); c2.restore();
        c2.strokeStyle='rgba(255,255,255,0.5)'; c2.lineWidth=3;
        c2.beginPath(); c2.arc(60,60,56,0,6.28); c2.stroke();
      } else { drawPreviewFace(c2,60,54,42,f.palette); }
    };
    drawPrev();
    // redraw when the photo actually finishes loading (chain onto loadImg's own
    // onload so _ok is set first), with a timed backup for cached/edge cases
    if(img && !img._ok){
      const prior=img.onload;
      img.onload=function(){ if(prior) prior.call(img); drawPrev(); };
    }
    setTimeout(drawPrev,600);
    wrap.appendChild(el);
  });
}
// standalone preview face (mirrors roundFace but on any ctx)
function drawPreviewFace(c,x,y,r,p){
  const g=c.createRadialGradient(x-r*0.3,y-r*0.4,r*0.2,x,y,r);
  g.addColorStop(0,lighten(p.body,30)); g.addColorStop(1,p.body2||p.body);
  c.fillStyle=g; c.beginPath(); c.ellipse(x,y,r*0.92,r,0,0,6.28); c.fill();
  if(p.hat){ c.fillStyle=p.hat; c.beginPath(); c.ellipse(x,y-r*0.62,r*0.78,r*0.34,0,Math.PI,0); c.fill(); c.fillRect(x-r*0.78,y-r*0.66,r*1.56,r*0.12); }
  c.fillStyle='#fff'; for(const s of[-1,1]){ c.beginPath(); c.arc(x+s*r*0.34,y-r*0.12,r*0.18,0,6.28); c.fill(); }
  c.fillStyle='#222'; for(const s of[-1,1]){ c.beginPath(); c.arc(x+s*r*0.34,y-r*0.12,r*0.08,0,6.28); c.fill(); }
  c.strokeStyle='#3a1020'; c.lineWidth=r*0.08; c.lineCap='round';
  c.beginPath(); c.moveTo(x-r*0.4,y+r*0.32); c.quadraticCurveTo(x,y+r*0.6,x+r*0.4,y+r*0.32); c.stroke();
}

// ---------- color helper ----------
function lighten(hex,amt){
  const c=hex.replace('#',''); const n=parseInt(c.length===3?c.split('').map(x=>x+x).join(''):c,16);
  let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
  r=Math.min(255,Math.max(0,r)); g=Math.min(255,Math.max(0,g)); b=Math.min(255,Math.max(0,b));
  return 'rgb('+r+','+g+','+b+')';
}

//=================================================================
// Leaderboard (all-time, 3-initial arcade style — shares the site's
// Upstash-backed /api/scores backend; game id "bub")
//=================================================================
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initialsString(){ return initialsChars.map(c=>String.fromCharCode(65+((c%26)+26)%26)).join(''); }
function loadInitials(){
  let s=lsGet('bub_initials','OLI'); if(!/^[A-Z]{3}$/.test(s)) s='OLI';
  initialsChars=[s.charCodeAt(0)-65, s.charCodeAt(1)-65, s.charCodeAt(2)-65];
}
// 3 big tappable letter cells. Tap a cell to cycle its letter (kid-friendly,
// no keyboard needed); physical keyboard also works (see keydown below).
function buildInitialsRow(){
  const row=document.getElementById('initials-row'); if(!row) return;
  row.innerHTML='';
  for(let i=0;i<3;i++){
    const cell=document.createElement('div');
    cell.className='init-cell'+(i===initialsCursor?' active':'');
    cell.textContent=String.fromCharCode(65+initialsChars[i]);
    cell.addEventListener('click',()=>{
      if(initialsSubmitting||submittedThisRun) return;
      initialsCursor=i;
      initialsChars[i]=(initialsChars[i]+1)%26;
      buildInitialsRow();
    });
    row.appendChild(cell);
  }
}
function startLeaderboardEntry(scoreVal){
  pendingScore=scoreVal; submittedThisRun=false; initialsSubmitting=false; initialsCursor=0;
  loadInitials();
  buildInitialsRow();
  const btn=document.getElementById('btn-save');
  btn.disabled=false; btn.textContent='⭐ Save my score'; btn.style.display='block';
  document.getElementById('rank-line').textContent='';
  document.getElementById('entry-hint').style.display='block';
  document.getElementById('initials-row').style.display='flex';
  renderBoard(document.getElementById('lb-list'), lbCache.alltime, null);
  fetchLeaderboard(()=>renderBoard(document.getElementById('lb-list'), lbCache.alltime, null));
}
function submitInitials(){
  if(initialsSubmitting||submittedThisRun) return;
  const initials=initialsString();
  if(!/^[A-Z]{3}$/.test(initials)) return;
  lsSet('bub_initials', initials);
  initialsSubmitting=true;
  const btn=document.getElementById('btn-save'); btn.disabled=true; btn.textContent='Saving…';
  doSubmit(initials, pendingScore, (ok,data)=>{
    initialsSubmitting=false;
    if(ok){
      submittedThisRun=true;
      try{ localStorage.removeItem('bub_pending'); }catch(e){}
      const rank=data && data.alltimeRank;
      document.getElementById('rank-line').textContent = rank ? ('🎉 You’re #'+rank+' all-time!') : '⭐ Saved to the board!';
      if(data){ lbCache.alltime=data.alltime||lbCache.alltime; lbCache.daily=data.daily||lbCache.daily; }
      renderBoard(document.getElementById('lb-list'), lbCache.alltime, initials);
      document.getElementById('entry-hint').style.display='none';
      document.getElementById('initials-row').style.display='none';
      btn.style.display='none';
      if(typeof gtag==='function') gtag('event','bub_score_submitted',{score:pendingScore});
    } else {
      try{ localStorage.setItem('bub_pending', JSON.stringify({initials:initials,score:pendingScore})); }catch(e){}
      btn.disabled=false; btn.textContent='Try Save Again';
      document.getElementById('rank-line').textContent='Couldn’t save — we’ll try again later.';
    }
  });
}
function doSubmit(initials, scoreVal, cb){
  let done=false; const finish=(ok,data)=>{ if(done)return; done=true; cb(ok,data); };
  setTimeout(()=>finish(false,null), 6000);     // network safety net
  fetch(API_URL,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({initials:initials,score:scoreVal}) })
    .then(r=> r.ok ? r.json().then(d=>finish(true,d)) : r.json().then(d=>finish(false,d)).catch(()=>finish(false,null)) )
    .catch(()=>finish(false,null));
}
function fetchLeaderboard(cb){
  let done=false; const finish=(data)=>{ if(done)return; done=true; if(cb)cb(data); };
  setTimeout(()=>finish(null), 6000);
  fetch(API_URL+'&limit='+LB_LIMIT,{method:'GET'})
    .then(r=> r.ok ? r.json() : null)
    .then(data=>{ if(data){ lbCache.alltime=data.alltime||[]; lbCache.daily=data.daily||[]; } finish(data); })
    .catch(()=>finish(null));
}
function renderBoard(listEl, list, mine){
  if(!listEl) return;
  if(!list || !list.length){ listEl.innerHTML='<div class="lb-empty">No scores yet — be the first! 🎈</div>'; return; }
  let html='';
  for(const e of list){
    const top=e.rank<=3?' top':'';
    const me=(mine && e.initials===mine)?' lbme':'';
    const medal=e.rank===1?'🥇':e.rank===2?'🥈':e.rank===3?'🥉':(e.rank+'.');
    html += '<div class="lb-rank'+top+me+'">'+medal+'</div>'+
            '<div class="lb-init'+me+'">'+escapeHtml(e.initials)+(e.rank===1?' 👑':'')+'</div>'+
            '<div class="lb-score'+me+'">'+Number(e.score).toLocaleString()+'</div>';
  }
  listEl.innerHTML=html;
}
function checkPendingSubmission(){
  let p; try{ p=JSON.parse(localStorage.getItem('bub_pending')||'null'); }catch(e){ p=null; }
  if(p && /^[A-Z]{3}$/.test(p.initials) && p.score>0){
    doSubmit(p.initials, p.score, (ok)=>{ if(ok){ try{ localStorage.removeItem('bub_pending'); }catch(e){} } });
  }
}
function showBoard(){
  const mine=lsGet('bub_initials','OLI');
  renderBoard(document.getElementById('board-list'), lbCache.alltime, mine);
  fetchLeaderboard(()=>renderBoard(document.getElementById('board-list'), lbCache.alltime, mine));
  show('screen-start',false);
  show('screen-board',true);
}
function hideBoard(){ show('screen-board',false); show('screen-start',true); }
// physical keyboard support (desktop / adults): type letters, arrows move, Enter saves
document.addEventListener('keydown',(e)=>{
  if(state!=='end'||submittedThisRun||initialsSubmitting) return;
  const end=document.getElementById('screen-end');
  if(!end||!end.classList.contains('show')) return;
  if(e.key==='Enter'){ submitInitials(); return; }
  if(e.key==='ArrowLeft'){ initialsCursor=(initialsCursor+2)%3; buildInitialsRow(); return; }
  if(e.key==='ArrowRight'){ initialsCursor=(initialsCursor+1)%3; buildInitialsRow(); return; }
  if(/^[a-zA-Z]$/.test(e.key)){
    initialsChars[initialsCursor]=e.key.toUpperCase().charCodeAt(0)-65;
    initialsCursor=Math.min(2, initialsCursor+1);
    buildInitialsRow();
  }
});

// ---------- wire buttons ----------
document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-save').addEventListener('click', submitInitials);
document.getElementById('btn-board').addEventListener('click', showBoard);
document.getElementById('btn-board-back').addEventListener('click', hideBoard);
document.getElementById('btn-again').addEventListener('click', ()=>{ refreshStartScreen(); show('screen-end',false); startGame(); });
document.getElementById('btn-retry').addEventListener('click', ()=>{ initAudio(); show('screen-lost',false); beginLevel(false); });
document.getElementById('lost-startover').addEventListener('click', ()=>{ initAudio(); show('screen-lost',false); startGame(); });

// ---------- boot ----------
resize();
loadInitials();
refreshStartScreen();
updateHUD();
fetchLeaderboard();          // warm the board so it's ready on the win screen
checkPendingSubmission();    // retry any score that failed to save last time
</script>
</body>
