  <a class="back-link" href="/" aria-label="Back to Dad Arcade">← Dad Arcade</a>

  <main id="app" aria-live="polite">
    <header class="app-header">
      <h1>Morning Drive</h1>
      <p class="app-sub" id="app-date"></p>
      <div class="score-row">
        <span class="score-badge score-claire">Claire <strong id="score-claire">0</strong> / 5 ⭐</span>
        <span class="score-badge score-connor">Connor <strong id="score-connor">0</strong> / 5 ⭐</span>
      </div>
      <div id="read-only-banner" class="read-only-banner" hidden>
        <span>Reviewing <strong id="ro-date"></strong></span>
        <button type="button" id="back-to-today">Back to today</button>
      </div>
    </header>

    <div id="status" class="status">Loading today's questions…</div>
    <div id="error" class="error" hidden></div>

    <div id="sections" class="sections" hidden></div>
  </main>

  <button type="button" id="past-days-btn" class="past-pill">📅 Past Days</button>

  <div id="past-sheet" class="past-sheet" hidden role="dialog" aria-modal="true" aria-label="Past Days">
    <div class="past-card">
      <button type="button" class="past-close" aria-label="Close">×</button>
      <h2>Past Days</h2>
      <div id="past-list" class="past-list"></div>
    </div>
  </div>
